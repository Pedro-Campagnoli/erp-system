name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
          POSTGRES_DB: erp_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d erp_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://erp:erp@localhost:5432/erp_db?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 4
      API_PREFIX: api
      CORS_ORIGIN: "*"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm prisma:generate

      - run: pnpm prisma:deploy

      - run: pnpm build

      - run: pnpm lint

      - run: pnpm test
