services:
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: ${POSTGRES_DB:-erp_db}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - erp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-erp} -d ${POSTGRES_DB:-erp_db}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  erp_postgres_data:
